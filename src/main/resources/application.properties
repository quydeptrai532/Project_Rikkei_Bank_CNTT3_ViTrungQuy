spring.application.name=rikkeibank
# ==========================================
# 1. SERVER CONFIGURATION
# ==========================================
server.port=8080
# ==========================================
# 2. DATABASE & JPA CONFIGURATION (MySQL)
# ==========================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/rikkei_bank_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456$

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# B?t tính n?ng Open-in-view v? false ?? t?i ?u hi?u n?ng (chu?n REST API)
spring.jpa.open-in-view=false

# ==========================================
# 3. LOGGING & AOP CONFIGURATION
# ==========================================
logging.file.name=logs/application.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} - %-5level - %logger{50} - %msg%n
logging.logback.rollingpolicy.max-file-size=50MB
logging.logback.rollingpolicy.max-history=30

# M?c Log c? b?n
logging.level.root=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

# M?c Log cho Project Rikkei Bank c?a b?n
logging.level.com.example.rikkeibank=DEBUG
logging.level.com.example.rikkeibank.aspect=INFO

# C?u hěnh AOP (M?c ??nh důng CGLIB proxy)
spring.aop.proxy-target-class=true

# ==========================================
# 4. JWT SECURITY CONFIGURATION
# ==========================================
# Secret Key b?t bu?c ph?i dŕi h?n 32 ký t? (256-bit) theo chu?n b?o m?t
jwt.secret=RikkeiBankSecretKeyForJwtAuthenticationMustBeAtLeast256BitsLong

# Access Token: 15 phút = 15 * 60 * 1000 = 300000 ms
jwt.expiration.access-token=900000

# Refresh Token: 1 ngŕy = 24 * 60 * 60 * 1000 = 86400000 ms
jwt.expiration.refresh-token=86400000

# ==========================================
# 5. CLOUD STORAGE CONFIGURATION (eKYC - UC-05)
# ==========================================
# (?i?n thông tin API Key c?a b?n n?u důng Cloudinary)
cloudinary.cloud-name=dwgwbwblp
cloudinary.api-key=451971957597317
